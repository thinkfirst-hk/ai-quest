<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>先思考!Think First! — AI 大挑戰</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#EAF4FF;
    --ink:#1B2A4A;
    --coral:#FF6B5B;
    --sunny:#FFC83D;
    --mint:#3ECF8E;
    --blue:#4A8FE7;
    --card:#FFFFFF;
    --shadow:0 6px 0 rgba(27,42,74,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--sky);
    color:var(--ink);
    font-family:'Nunito',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:16px;
  }
  .app{width:100%;max-width:520px}
  h1,h2,h3,.btn,.badge-name{font-family:'Baloo 2','Nunito',system-ui,sans-serif}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .logo{font-family:'Baloo 2';font-weight:800;font-size:1.25rem;letter-spacing:.3px}
  .logo span{color:var(--coral)}
  .lang-toggle{
    border:3px solid var(--ink);background:var(--card);border-radius:999px;
    font-family:'Baloo 2';font-weight:700;font-size:.85rem;padding:6px 14px;
    cursor:pointer;box-shadow:var(--shadow);transition:transform .1s;
  }
  .lang-toggle:active{transform:translateY(3px);box-shadow:none}

  /* think-first meter (signature element) */
  .meter-wrap{margin:10px 0 18px}
  .meter-labels{display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
  .meter-labels .l{color:var(--coral)} .meter-labels .m{color:var(--mint)} .meter-labels .r{color:var(--blue)}
  .meter{
    position:relative;height:26px;border:3px solid var(--ink);border-radius:999px;overflow:hidden;
    background:linear-gradient(90deg,#FFD9D4 0%,#FFD9D4 32%,#CFF5E4 32%,#CFF5E4 68%,#D7E8FF 68%,#D7E8FF 100%);
  }
  .meter-needle{
    position:absolute;top:-4px;width:14px;height:34px;background:var(--ink);border-radius:6px;
    left:50%;transform:translateX(-50%);transition:left .6s cubic-bezier(.34,1.56,.64,1);
  }
  .meter-caption{text-align:center;font-size:.78rem;font-weight:700;margin-top:5px;opacity:.75}

  /* cards */
  .card{
    background:var(--card);border:3px solid var(--ink);border-radius:22px;
    box-shadow:var(--shadow);padding:22px;
  }
  .scene-tag{
    display:inline-block;background:var(--sunny);border:2.5px solid var(--ink);border-radius:999px;
    font-family:'Baloo 2';font-weight:700;font-size:.78rem;padding:3px 12px;margin-bottom:12px;
  }
  .scene-emoji{font-size:2.6rem;line-height:1;margin-bottom:10px}
  .scene-text{font-size:1.02rem;font-weight:700;line-height:1.55;margin-bottom:18px}

  .btn{
    display:block;width:100%;text-align:left;
    background:var(--card);border:3px solid var(--ink);border-radius:16px;
    font-weight:700;font-size:.95rem;line-height:1.4;
    padding:13px 16px;margin-bottom:10px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .1s, background .15s;
  }
  .btn:hover{background:#FFF6DE}
  .btn:active{transform:translateY(4px);box-shadow:none}
  .btn:focus-visible{outline:3px dashed var(--blue);outline-offset:3px}

  .btn.primary{
    background:var(--coral);color:#fff;text-align:center;
    font-family:'Baloo 2';font-size:1.05rem;letter-spacing:.3px;
  }
  .btn.primary:hover{background:#ff5946}

  .btn-back{
    background:none;border:none;cursor:pointer;
    font-family:'Baloo 2','Nunito',system-ui,sans-serif;font-weight:700;font-size:.88rem;
    color:var(--ink);opacity:.55;padding:8px 4px;margin-top:2px;
  }
  .btn-back:hover{opacity:1;text-decoration:underline}
  .btn-back:focus-visible{outline:3px dashed var(--blue);outline-offset:3px;opacity:1}

  /* feedback */
  .verdict{
    font-family:'Baloo 2';font-weight:800;font-size:1.2rem;margin-bottom:8px;
    display:flex;align-items:center;gap:8px;
  }
  .verdict.wise{color:#1d9e69}.verdict.okay{color:#c98f00}.verdict.risky{color:var(--coral)}
  .explain{font-size:.95rem;font-weight:600;line-height:1.6;margin-bottom:16px}
  .tip{
    background:#FFF6DE;border:2.5px dashed var(--ink);border-radius:14px;
    padding:12px 14px;font-size:.88rem;font-weight:700;margin-bottom:18px;
  }
  .tip b{color:var(--coral)}

  /* progress dots */
  .dots{display:flex;gap:8px;justify-content:center;margin:16px 0 4px}
  .dot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--ink);background:var(--card)}
  .dot.done{background:var(--mint)}
  .dot.now{background:var(--sunny)}

  /* end screen */
  .end{text-align:center}
  .badge{
    width:120px;height:120px;border-radius:50%;margin:8px auto 14px;
    display:flex;align-items:center;justify-content:center;font-size:3.2rem;
    border:4px solid var(--ink);box-shadow:var(--shadow);
  }
  .badge.gold{background:var(--sunny)} .badge.silver{background:#D7E8FF} .badge.bronze{background:#FFD9D4}
  .badge-name{font-size:1.5rem;font-weight:800;margin-bottom:6px}
  .end-sub{font-weight:700;opacity:.8;margin-bottom:18px;line-height:1.55}
  .score-pill{
    display:inline-block;background:var(--ink);color:#fff;border-radius:999px;
    font-family:'Baloo 2';font-weight:700;padding:6px 18px;margin-bottom:18px;
  }

  /* intro */
  .intro h1{font-size:1.7rem;font-weight:800;line-height:1.25;margin-bottom:10px}
  .intro h1 em{font-style:normal;color:var(--coral)}
  .intro p{font-weight:700;line-height:1.6;opacity:.85;margin-bottom:18px}
  .age-row{display:flex;gap:8px;margin-bottom:18px}
  .age-chip{
    flex:1;text-align:center;border:3px solid var(--ink);border-radius:14px;background:var(--card);
    font-family:'Baloo 2';font-weight:700;font-size:.85rem;padding:9px 4px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .1s;
  }
  .age-chip.sel{background:var(--mint)}
  .age-chip:active{transform:translateY(3px);box-shadow:none}
  .footer-note{text-align:center;font-size:.72rem;font-weight:700;opacity:.5;margin-top:14px}

  @media (prefers-reduced-motion: reduce){
    .meter-needle{transition:none}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Think<span>First!</span> 🧠</div>
    <button class="lang-toggle" id="langBtn" onclick="toggleLang()">English</button>
  </div>

  <div class="meter-wrap" id="meterWrap" style="display:none">
    <div class="meter-labels"><span class="l" id="mlL"></span><span class="m" id="mlM"></span><span class="r" id="mlR"></span></div>
    <div class="meter"><div class="meter-needle" id="needle"></div></div>
    <div class="meter-caption" id="meterCap"></div>
  </div>

  <div class="card" id="stage"></div>
  <div class="dots" id="dots"></div>
  <div class="footer-note" id="footNote"></div>
</div>

<script>
/* ---------------- i18n + content ---------------- */
const UI = {

/* each option: t = text, s = score (2 wise / 1 okay / 0 risky), m = meter push (-1 over-trust, +1 over-doubt, 0 balanced)
   Three sets, one per age group. Same six themes & same "think first" purpose — only the level changes. */
const SCENARIO_SETS = [

/* ===== Ages 8–10: simple words, everyday situations ===== */
[
  {

    en:{ q:"You're stuck on a maths question. A robot helper gives you the answer straight away. What do you do?",
      opts:[
        {t:"Copy the answer — finished!", s:0, m:-1, ex:"If the robot does the thinking, your brain doesn't get to grow. Try first, then check!"},
        {t:"Ask the robot to show me HOW, then try one by myself.", s:2, m:0, ex:"Super! The robot is a great helper when it teaches you — and YOU do the trying."},
        {t:"Never ask the robot anything, even when I'm really stuck.", s:1, m:1, ex:"Asking for help is okay! Helpers are fine — just make sure your brain does the work too."}

    zh:{ q:"你有一題數學唔識做。AI 機械人即刻俾咗答案你。你會點做?",
      opts:[
        {t:"照抄答案 — 完成!", s:0, m:-1, ex:"如果機械人幫你思考,你的腦袋就不會變聰明。先自己試,再對答案!"},
        {t:"請機械人教我「點樣做」,然後自己試一題。", s:2, m:0, ex:"好叻!機械人教你方法、你自己動腦,這樣用 AI 最棒!"},
        {t:"就算好唔識,都唔問機械人。", s:1, m:1, ex:"唔識就問,沒問題!有幫手是好事 — 記住要自己動腦就可以了。"}
      ]}
  },
  {
    emoji:"🔒",
    en:{ q:"A talking game app says: \"Tell me your real name, your school and where you live — then we can be best friends!\"",
      opts:[
        {t:"Tell it everything — it's only a game.", s:0, m:-1, ex:"Stop! Your name, school and home address are secrets on the internet. People you don't know might see them."},
        {t:"Keep my secrets safe and tell a grown-up what the game asked.", s:2, m:0, ex:"Perfect! Keep personal things private — and telling a grown-up is always a smart move."},
        {t:"Get scared and never play any games again.", s:1, m:1, ex:"You don't need to be scared of every game! Just remember the rule: never share personal things, then you can play safely."}
      ]},
    zh:{ q:"一個識講嘢的遊戲 App 話:「話我知你的真名、學校同住喺邊,我哋就做最好的朋友!」",
      opts:[
        {t:"全部話佢知 — 只係遊戲啫。", s:0, m:-1, ex:"停一停!名字、學校、住址是上網時的秘密,陌生人可能會看到。"},
        {t:"保守秘密,仲要話俾大人聽個遊戲問過我啲乜。", s:2, m:0, ex:"好棒!個人資料要保密,告訴大人更是聰明的做法。"},
        {t:"好驚,以後乜遊戲都唔玩。", s:1, m:1, ex:"不用害怕所有遊戲!記住規則:個人資料不分享,就可以安心玩。"}
      ]}
  },
  {
    emoji:"🎬",
    en:{ q:"You see a video of a dog talking just like a person. Your friend says: \"It's real! Dogs can talk!\"",
      opts:[
        {t:"Believe it — videos don't lie!", s:0, m:-1, ex:"Computers can make pretend videos that look very real. Seeing isn't always believing!"},
        {t:"Think: \"Computers can make pretend videos. Let me ask a grown-up first.\"", s:2, m:0, ex:"Clever! Pausing to think and asking someone you trust is exactly what a Think-First Hero does."},
        {t:"Decide that every video on the internet is fake.", s:1, m:1, ex:"Not everything is fake! Some videos are real. The trick is to think first and check — not to stop believing everything."}
      ]},
    zh:{ q:"你看到一段影片:一隻狗好似人咁講嘢。朋友話:「係真㗎!狗識講嘢!」",
      opts:[
        {t:"信佢 — 影片唔會呃人!", s:0, m:-1, ex:"電腦可以整出好似真嘅「假影片」。眼見不一定為真!"},
        {t:"心諗:「電腦可以整假影片喎,等我問下大人先。」", s:2, m:0, ex:"聰明!停一停、想一想、問個信得過的人 — 這就是「先思考」英雄!"},

      ]}
  },
  {
    emoji:"🤖",
    en:{ q:"You ask the AI: \"How many legs does a spider have?\" It says \"6\" very confidently. But your teacher said 8!",

        {t:"The AI must be right — teacher made a mistake.", s:0, m:-1, ex:"Even when AI sounds very sure, it can still be wrong. It sometimes makes things up!"},
        {t:"Check my book or ask my teacher — AI can make mistakes.", s:2, m:0, ex:"Yes! Spiders have 8 legs. AI is a helper, but checking with books and teachers keeps you right."},

      opts:[

        {t:"查下書、問下老師 — AI 都會錯㗎。", s:2, m:0, ex:"正確!蜘蛛有 8 隻腳。AI 係幫手,但查書、問老師先至最穩陣。"},
        {t:"覺得 AI 好蠢,以後都唔問佢。", s:1, m:1, ex:"AI 都有好多嘢答啱!它只是需要一個檢查員 — 就係你。"}
      ]}
  },
  {
    emoji:"💬",
    en:{ q:"Your friend says: \"I only want to talk to the robot now. It's more fun than people.\" What do you do?",
      opts:[
        {t:"Agree — robot friends are all you need.", s:0, m:-1, ex:"Robots can be fun, but they can't give hugs, play tag or really care about you. People need people!"},
        {t:"Invite them to play together — robots are fun, but friends matter more.", s:2, m:0, ex:"That's a true friend! You can enjoy robots AND people — and people come first."},
        {t:"Tell them robots are stupid and grab the tablet away.", s:1, m:1, ex:"You want to help — that's kind! But snatching and name-calling can hurt. Inviting works much better."}
      ]},
    zh:{ q:"朋友話:「我而家淨係想同機械人傾偈,好玩過同人玩。」你會點做?",

        {t:"同意 — 有機械人朋友就夠啦。", s:0, m:-1, ex:"機械人好好玩,但它不能攬你、不能同你捉迷藏、不能真正關心你。人需要人!"},

  },
  {
    emoji:"🎨",
    en:{ q:"There's a class drawing competition. An AI app can make a beautiful picture for you in one second. You…",

/* ===== Ages 11–13: school & social life ===== */
[

        {t:"全部話佢知 — 佢只係機械人啫。", s:0, m:-1, ex:"停一停!你輸入的東西可能被儲存或被人看到。真朋友第一天不會問你住址 — 機械人也不應該。"},

/* active scenario set for the chosen age group */
function S(){ return SCENARIO_SETS[ageSel]; }

/* ---------------- state ---------------- */
let lang = "zh";
let step = -1;            // -1 intro, 0..5 scenarios, 6 end
let score = 0;
let meterPos = 0;         // -3..+3 roughly
let answered = null;      // chosen option during feedback
let history = [];         // committed answers: {s, m} per completed step
let ageSel = 1;

const stage = document.getElementById("stage");
const dots = document.getElementById("dots");

function t(){ return UI[lang]; }

function toggleLang(){
  lang = lang === "zh" ? "en" : "zh";
  document.getElementById("langBtn").textContent = lang === "zh" ? "English" : "繁體中文";
  render();
}

function setMeterUI(){
  const w = document.getElementById("meterWrap");
  w.style.display = step >= 0 && step < S().length + 1 ? "block" : "none";
  document.getElementById("mlL").textContent = t().mL;
  document.getElementById("mlM").textContent = t().mM;
  document.getElementById("mlR").textContent = t().mR;
  document.getElementById("meterCap").textContent = t().meterCap;
  const pct = 50 + Math.max(-3, Math.min(3, meterPos)) * 13;
  document.getElementById("needle").style.left = pct + "%";
}

function renderDots(){
  dots.innerHTML = "";
  if(step < 0 || step > S().length){ return; }
  for(let i=0;i<S().length;i++){
    const d = document.createElement("div");
    d.className = "dot" + (i < step ? " done" : i === step ? " now" : "");
    dots.appendChild(d);
  }
}

function render(){
  document.getElementById("footNote").textContent = t().foot;
  setMeterUI(); renderDots();

  if(step === -1){ renderIntro(); }
  else if(step >= S().length){ renderEnd(); }
  else if(answered !== null){ renderFeedback(); }
  else{ renderScenario(); }
}

function renderIntro(){
  const u = t();
  stage.innerHTML = `
    <div class="intro">
      <div class="scene-emoji">🤖🧠✨</div>
      <h1>${u.introH}</h1>
      <p>${u.introP}</p>
      <div style="font-weight:800;margin-bottom:8px">${u.ageQ}</div>
      <div class="age-row">
        ${u.ages.map((a,i)=>`<button class="age-chip ${i===ageSel?'sel':''}" onclick="pickAge(${i})">${a}</button>`).join("")}
      </div>
      <button class="btn primary" onclick="startQuest()">${u.start}</button>
    </div>`;
}

function pickAge(i){ ageSel = i; render(); }

function startQuest(){ step = 0; score = 0; meterPos = 0; answered = null; history = []; render(); }

function renderScenario(){
  const s = S()[step][lang];
  stage.innerHTML = `
    <span class="scene-tag">${t().tagScene} ${step+1} / ${S().length}</span>
    <div class="scene-emoji">${S()[step].emoji}</div>
    <div class="scene-text">${s.q}</div>
    ${s.opts.map((o,i)=>`<button class="btn" onclick="choose(${i})">${o.t}</button>`).join("")}
    <button class="btn-back" onclick="goBack()">${t().back}</button>
  `;
}

function choose(i){
  const o = S()[step][lang].opts[i];
  answered = i;
  score += o.s;
  meterPos += o.m;
  render();
}

function renderFeedback(){
  const o = S()[step][lang].opts[answered];
  const cls = o.s === 2 ? "wise" : o.s === 1 ? "okay" : "risky";
  const icon = o.s === 2 ? "🌟" : o.s === 1 ? "🤔" : "⚠️";
  const verdict = o.s === 2 ? t().wise : o.s === 1 ? t().okay : t().risky;
  const last = step === S().length - 1;
  stage.innerHTML = `
    <div class="verdict ${cls}">${icon} ${verdict}</div>
    <div class="explain">${o.ex}</div>
    <div class="tip"><b>${t().tip}</b> ${lang==="en"
      ? "AI is a tool, not a boss and not an enemy. You stay the pilot. 🧑‍✈️"
      : "AI 是工具,不是老闆,也不是敵人。掌舵的人永遠是你。🧑‍✈️"}</div>
    <button class="btn primary" onclick="nextStep()">${last ? t().finish : t().next}</button>
    <button class="btn-back" onclick="goBack()">${t().back}</button>
  `;
}

function nextStep(){
  const o = S()[step][lang].opts[answered];
  history[step] = {s:o.s, m:o.m};
  answered = null; step++; render();
}

function goBack(){
  if(answered !== null){
    /* on feedback screen: undo this answer, re-show the same question */
    const o = S()[step][lang].opts[answered];
    score -= o.s; meterPos -= o.m;
    answered = null;
  } else if(step === 0){
    /* first question: return to intro */
    step = -1;
  } else if(step > 0){
    /* return to previous question and undo its committed answer */
    step--;
    const h = history[step];
    if(h){ score -= h.s; meterPos -= h.m; history[step] = null; }
  }
  render();
}

function renderEnd(){
  const max = S().length * 2;
  const tier = score >= max - 2 ? "gold" : score >= max/2 ? "silver" : "bronze";
  const [emoji, name] = t().badges[tier];
  stage.innerHTML = `
    <div class="end">
      <div class="badge ${tier}">${emoji}</div>
      <div class="badge-name">${name}</div>
      <div class="score-pill">${score} / ${max} ${t().score}</div>
      <div class="end-sub">${t().endSub}</div>
      <button class="btn primary" onclick="startQuest()">${t().again}</button>
    </div>`;
}

render();
</script>
