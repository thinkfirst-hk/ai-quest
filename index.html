<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think First! AI Quest — 先思考!AI 任務</title>
<style>
  :root{
    --sky:#EAF4FF; --ink:#1B2A4A; --card:#FFFFFF;
    --pause:#FF6B5B; --question:#FFC83D; --verify:#4A8FE7; --decide:#3ECF8E; --own:#9B6BF2;
    --soft:#F4EFFF; --paper:#FFF6DE;
    --shadow:0 5px 0 rgba(27,42,74,.12);
    --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--sky); color:var(--ink);
    font-family:-apple-system,"Segoe UI","PingFang HK","PingFang TC","Microsoft JhengHei","Noto Sans TC",Roboto,sans-serif;
    min-height:100vh; display:flex; justify-content:center; padding:14px;
    line-height:1.55;
  }
  .app{width:100%;max-width:560px}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .logo{font-weight:800;font-size:1.15rem;letter-spacing:.2px}
  .logo b{color:var(--pause)}
  .topbtns{display:flex;gap:6px}
  .pill{
    border:2.5px solid var(--ink);background:var(--card);border-radius:999px;
    font-weight:700;font-size:.82rem;padding:8px 14px;min-height:44px;
    cursor:pointer;box-shadow:var(--shadow);color:var(--ink);
  }
  .pill:active{transform:translateY(3px);box-shadow:none}
  .pill:focus-visible,.btn:focus-visible,.chk:focus-visible{outline:3px dashed var(--verify);outline-offset:3px}

  /* cards */
  .card{background:var(--card);border:3px solid var(--ink);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .tag{display:inline-block;background:var(--question);border:2.5px solid var(--ink);border-radius:999px;font-weight:800;font-size:.74rem;padding:3px 12px;margin-bottom:10px}
  .big{font-size:2.4rem;line-height:1.15;margin-bottom:8px}
  h1{font-size:1.45rem;line-height:1.3;margin-bottom:8px}
  h2{font-size:1.12rem;margin-bottom:8px}
  p{margin-bottom:10px}
  .muted{opacity:.72;font-size:.9rem}
  .story{font-size:1rem;font-weight:600;white-space:pre-line}

  /* think-first loop chips */
  .loop{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0 14px}
  .chip{font-size:.7rem;font-weight:800;padding:5px 10px;border-radius:999px;border:2.5px solid var(--ink);background:#fff;opacity:.4}
  .chip.on{opacity:1;background:var(--c);box-shadow:var(--shadow)}

  /* buttons / choices */
  .btn{
    display:block;width:100%;text-align:left;background:var(--card);
    border:3px solid var(--ink);border-radius:14px;color:var(--ink);
    font-weight:700;font-size:.95rem;line-height:1.45;font-family:inherit;
    padding:13px 15px;margin-bottom:10px;min-height:48px;cursor:pointer;
    box-shadow:var(--shadow);
  }
  .btn:hover{background:var(--paper)}
  .btn:active{transform:translateY(4px);box-shadow:none}
  .btn.primary{background:var(--pause);color:#fff;text-align:center;font-size:1.02rem}
  .btn.primary:hover{background:#ff5946}
  .btn.ghost{background:none;border:none;box-shadow:none;opacity:.6;text-align:center;font-size:.88rem;min-height:44px}
  .btn.ghost:hover{opacity:1;text-decoration:underline}

  /* Captain Sonar (designer pose SVGs) + inline art */
  .sonar{display:flex;gap:10px;align-items:flex-start;margin:12px 0}
  .owlart{flex:0 0 58px;width:58px}
  .owlart svg{width:100%;height:auto;display:block}
  .artw{display:inline-block;vertical-align:middle}
  .artw svg{width:100%;height:auto;display:block}
  .scenebox{border:2.5px solid var(--ink);border-radius:12px;overflow:hidden;margin:2px 0 12px;background:#fff}
  .scenebox svg{display:block;width:100%;height:auto}
  .shead{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .shead .tag{margin-bottom:0}
  .cast{display:flex;margin-left:auto}
  .cast .artw{width:30px;height:30px;border-radius:50%;border:2px solid var(--ink);overflow:hidden;background:#fff;margin-left:-8px}
  .cast .artw svg{width:100%;height:100%}
  .bubble{position:relative;background:var(--soft);border:2.5px solid var(--ink);border-radius:14px;padding:10px 13px;font-weight:600;font-size:.92rem}
  .bubble::before{content:"";position:absolute;left:-15px;top:16px;border:7px solid transparent;border-right-color:var(--ink)}
  .bubble b.who{display:block;font-size:.72rem;letter-spacing:.4px;opacity:.65;margin-bottom:2px}

  /* outcome tones */
  .outcome{border-radius:14px;border:3px solid var(--ink);padding:13px 15px;margin:10px 0;font-weight:600}
  .outcome.wise{background:#E7FAF1;animation:glowp 1.1s ease-out 1}
  .outcome.risky{background:#FFE9E6;animation:shake .5s ease-in-out 1}
  .outcome.mixed{background:var(--paper);animation:tilt .55s ease-in-out 1}
  .verdict{font-weight:800;margin-bottom:4px}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes glowp{0%{box-shadow:0 0 0 0 rgba(62,207,142,.65)}100%{box-shadow:0 0 0 18px rgba(62,207,142,0)}}
  @keyframes tilt{0%,100%{transform:rotate(0)}30%{transform:rotate(-1.2deg)}70%{transform:rotate(1.2deg)}}

  /* pilot meter */
  .meter{display:flex;gap:6px;margin:6px 0 2px}
  .seg{flex:1;height:20px;border:2.5px solid var(--ink);border-radius:9px;background:#fff;overflow:hidden}
  .seg i{display:block;height:100%;background:var(--c);width:0%}
  .mlabels{display:flex;gap:6px;margin-bottom:8px}
  .mlabels span{flex:1;text-align:center;font-size:.62rem;font-weight:800;letter-spacing:.2px}

  /* mission map */
  .mcard{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:3px solid var(--ink);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px;min-height:60px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .mcard:active{transform:translateY(3px);box-shadow:none}
  .mcard .ic{font-size:1.7rem}
  .mcard .tt{font-weight:800;font-size:.95rem}
  .mcard .st{font-size:.76rem;font-weight:700;opacity:.65}
  .mcard.locked{opacity:.5;cursor:not-allowed}
  .mcard.done{background:#E7FAF1}

  /* age tier chips */
  .tiers{display:flex;gap:8px;margin:8px 0 14px}
  .tier{flex:1;border:3px solid var(--ink);border-radius:14px;background:var(--card);box-shadow:var(--shadow);padding:10px;cursor:pointer;font-family:inherit;color:var(--ink);min-height:64px}
  .tier.sel{background:var(--decide)}
  .tier b{display:block;font-size:.95rem}
  .tier small{font-weight:700;font-size:.72rem;opacity:.7}
  input.name{width:100%;border:3px solid var(--ink);border-radius:12px;padding:11px 13px;font-size:1rem;font-weight:700;font-family:inherit;color:var(--ink);background:#fff;margin:4px 0 14px;min-height:48px}

  /* check */
  .chk{display:block;width:100%;text-align:left;background:#fff;border:3px solid var(--ink);border-radius:14px;font-weight:700;font-size:.95rem;font-family:inherit;color:var(--ink);padding:13px 15px;margin-bottom:10px;min-height:48px;cursor:pointer;box-shadow:var(--shadow)}
  .chk:active{transform:translateY(3px);box-shadow:none}
  .chk.good{background:#E7FAF1} .chk.no{background:#FFE9E6;opacity:.85}

  /* licence */
  .lic{border:3px solid var(--ink);border-radius:16px;background:linear-gradient(135deg,#fff 60%,var(--soft));padding:4px;margin-bottom:14px}
  .lic .inner{border:2px dashed var(--ink);border-radius:12px;padding:14px;text-align:center}
  .lic .nm{font-size:1.3rem;font-weight:800}
  .lic .row{display:flex;justify-content:space-between;gap:8px;font-size:.82rem;font-weight:700;margin-top:8px;text-align:left}
  .lic .stamp{display:inline-block;border:2.5px solid var(--own);color:var(--own);border-radius:10px;padding:2px 10px;font-weight:800;font-size:.8rem;transform:rotate(-6deg);margin-top:10px}
  .skillpill{display:inline-block;border:2.5px solid var(--ink);border-radius:999px;background:var(--c);font-weight:800;font-size:.8rem;padding:3px 12px}

  .mission{display:flex;gap:10px;align-items:flex-start;border:2.5px dashed var(--ink);border-radius:12px;padding:10px 12px;margin-bottom:9px;font-weight:600;font-size:.92rem;background:#fff}
  .mission .dot{flex:0 0 14px;width:14px;height:14px;border-radius:50%;border:2.5px solid var(--ink);background:var(--c);margin-top:4px}

  /* pilot profile badge */
  .pcard{border:3px solid var(--ink);border-radius:16px;background:linear-gradient(135deg,#fff 55%,var(--paper));box-shadow:var(--shadow);padding:16px;text-align:center;margin-bottom:14px}
  .emblem{width:86px;height:86px;border-radius:50%;border:5px solid var(--pc,#1B2A4A);display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin:4px auto 8px;background:#fff;box-shadow:var(--shadow)}
  .pname{font-size:1.35rem;font-weight:800}
  .pline{font-weight:700;opacity:.85;margin:4px 0 12px}
  .prow{display:flex;gap:8px;text-align:left;font-size:.88rem;font-weight:600;margin-bottom:8px}
  .prow .k{flex:0 0 96px;font-weight:800}
  .snapshot{border:2.5px dashed var(--ink);border-radius:12px;background:#fff;padding:9px 12px;font-weight:700;font-size:.85rem;margin-top:10px}

  /* ---- motion library (from the designer's asset kit, tf- prefixed) ---- */
  @keyframes tf-pop{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .tf-pop{animation:tf-pop .45s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes tf-stamp{0%{transform:scale(2.2) rotate(-14deg);opacity:0}60%{transform:scale(.92) rotate(-7deg);opacity:1}100%{transform:scale(1) rotate(-8deg);opacity:1}}
  .tf-stamp{animation:tf-stamp .5s ease-out both}
  @keyframes tf-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .tf-bob{animation:tf-bob 2.4s ease-in-out infinite}
  @keyframes tf-hop{0%,100%{transform:translateY(0)}30%{transform:translateY(-10px) rotate(-4deg)}60%{transform:translateY(0)}80%{transform:translateY(-4px)}}
  .tf-hop{animation:tf-hop .7s ease-out 1}
  @keyframes tf-wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
  .tf-wiggle{animation:tf-wiggle .5s ease-in-out 2}
  @keyframes tf-enter{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
  .tf-enter{animation:tf-enter .35s ease-out both}
  @keyframes tf-glowp{0%,100%{box-shadow:0 0 0 0 rgba(27,42,74,0)}50%{box-shadow:0 0 0 6px rgba(27,42,74,.18)}}
  .chip.on{animation:tf-glowp 2s ease-in-out infinite}
  @keyframes tf-unlock{0%{transform:scale(1)}40%{transform:scale(1.05) rotate(1.2deg)}100%{transform:scale(1)}}
  .tf-unlock{animation:tf-unlock .6s ease-out 1;background:var(--paper)}
  @keyframes tf-twinkle{0%,100%{opacity:1}50%{opacity:.35}}
  .tf-twinkle{display:inline-block;animation:tf-twinkle 1.4s ease-in-out infinite}
  @keyframes tf-typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
  .tdots{display:inline-flex;gap:5px;padding:4px 2px}
  .tdots i{display:block;width:8px;height:8px;border-radius:50%;background:var(--ink);animation:tf-typing 1.1s ease-in-out infinite}
  .tdots i:nth-child(2){animation-delay:.18s}
  .tdots i:nth-child(3){animation-delay:.36s}
  @keyframes tf-confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(340px) rotate(540deg);opacity:0}}
  .lic{position:relative;overflow:hidden}

  /* debrief sheet */
  .sheet{background:#fff;border:3px solid var(--ink);border-radius:var(--r);padding:18px;margin-bottom:14px}
  .sheet h2{border-bottom:2.5px solid var(--ink);padding-bottom:6px}
  .sheet .sc{margin:12px 0;padding-bottom:8px;border-bottom:1.5px dashed rgba(27,42,74,.3)}
  .sheet .sc h3{font-size:.98rem;margin-bottom:4px}
  .sheet li{margin-left:18px;margin-bottom:4px;font-size:.9rem}
  .sheet .qs li{font-weight:700}
  .tones{font-size:.78rem;font-weight:700;opacity:.75;margin:6px 0}

  .footer{text-align:center;font-size:.72rem;font-weight:700;opacity:.5;margin:10px 0 30px}
  .center{text-align:center}
  details{margin:10px 0}
  summary{font-weight:800;cursor:pointer;min-height:44px;display:flex;align-items:center}

  @media (min-width:520px){ .big{font-size:2.8rem} }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important;transition:none !important}
  }
  @media print{
    body{background:#fff;padding:0}
    .no-print,.topbar{display:none !important}
    .sheet{border:1.5px solid #000;box-shadow:none;border-radius:0}
    .app{max-width:100%}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar no-print">
    <div class="logo">Think<b>First!</b> 🧭</div>
    <div class="topbtns">
      <button class="pill" id="sfxBtn" onclick="toggleMute()">🔊</button>
      <button class="pill" id="langBtn" onclick="toggleLang()">EN</button>
    </div>
  </div>
  <main id="app" aria-live="polite"></main>
  <div class="footer" id="foot"></div>
</div>

<script>
'use strict';
/*__CONTENT_START__*/

  /* pilot profile */

  flyAgain:{en:"🛫 Fly again — see if your profile changes", zh:"🛫 再飛一次——睇下個檔案會唔會變"},

  sigRisky:{en:"risky picks", zh:"危險選擇"},

 skills:["own","question"],

 nodes:{
  b1:{step:"pause",
    text:{en:{ex:"It's night time. Your essay “An Unforgettable Day” is due tomorrow — and your page is still empty!\nSmarty the AI helper pops up: “Want me to write the WHOLE essay? Thirty seconds!”",

              pi:"晚上 8 點 47 分。聽日要交作文——《難忘的一天》,你張稿紙得一句字。\n你打開 AI 幫手「醒目仔」。佢眨眨眼:「不如我幫你寫晒成篇?三十秒,仲有高級詞語㗎。😏」"}},

      {t:{en:"“Write it — I'll swap some words so it sounds like me.” 😏", zh:"「寫啦——我自己再改幾個字,扮返我把口。」😏"}, tone:"risky", axis:"trust", next:"c1d"}

  c1b:{type:"out", tone:"wise", step:"own",

              pi:"專題研習:《地下香港》!你問 AI:港鐵邊個站最深?\n秒答:「金鐘站——深 55 米,因為有四條線喺度交匯。(來源:《香港鐵路年鑑2019》)」\n流暢、精準、仲有埋出處。"}},
    sonar:{en:"Smooth answer! Tiny question: how do we know that yearbook… exists?",
           zh:"答得好順!小小問題:嗰本「年鑑」……真係存在嘅咩?"},
    choices:{
     pi:[
      {t:{en:"Paste it into the project. It literally cited a source!", zh:"照貼落專題度。佢都有列出處㗎!"}, tone:"risky", axis:"trust", set:{pasted:true}, next:"c1a"},
      {t:{en:"Search for that “HK Rail Yearbook 2019” first.", zh:"先 search 下嗰本《香港鐵路年鑑2019》。"}, tone:"wise", fx:{question:1, verify:1}, next:"c1b"},
      {t:{en:"Ask the AI: “Are you sure?”", zh:"問返 AI:「你肯定?」"}, tone:"mixed", fx:{question:1}, next:"c1c"}
     ],
     ex:[
      {t:{en:"Copy it into the project — it sounds so sure!", zh:"照抄落專題度——佢講到咁肯定!"}, tone:"risky", axis:"trust", set:{pasted:true}, next:"c1a"},
      {t:{en:"Check somewhere else first.", zh:"先去第二度查下。"}, tone:"wise", fx:{question:1, verify:1}, next:"c1b"}
     ]}
  },
  c1a:{type:"out", tone:"risky", step:"question",
    text:{en:"Pasted, formatted, DONE in two minutes. Next morning you present it… and Mei's hand shoots up: “Um — my mum works at HKU Station. SHE says that one's the deepest. Like, 70 metres?”\nThe class looks at you. The AI is not standing next to you.",
          zh:"貼完、執靚格式,兩分鐘搞掂。第二朝你出去報告……阿美隻手即刻舉高:「嗯——我媽媽喺香港大學站返工。佢話最深嗰個係香港大學站喎,成 70 米?」\n全班望住你。而個 AI,冇企喺你隔籬。"},
    ask:{en:"The AI answered in one second. Who's standing in front of the class?", zh:"AI 一秒就答咗。但企喺全班面前嘅,係邊個?"},
    next:"bx"},
  c1b:{type:"out", tone:"wise", step:"verify",
    text:{en:"You search. There is… no such book. A “source” that doesn't exist is called a hallucination — the AI didn't lie on purpose; it auto-completed something source-SHAPED. Good catch, pilot.",
          zh:"你 search 咗。根本……冇呢本書。一個唔存在嘅「出處」,叫做 AI 幻覺——佢唔係特登呃你,只係自動補完咗一舊「似出處嘅嘢」。捉得好,機師。"},
    ask:{en:"If the source is fake, what should we now assume about the answer?", zh:"出處係假嘅,咁個答案,我哋應該點睇?"},
    next:"b2"},
  c1c:{type:"out", tone:"mixed", step:"question",
    text:{en:"“You're right to check! I apologise. The deepest is actually Tsim Sha Tsui — 48 metres.”\n…Wait. That's a DIFFERENT confident answer. Asking the same tool again isn't verification — it's re-flipping the same coin.",
          zh:"「你問得啱!唔好意思。最深嘅其實係尖沙咀站——48 米。」\n……等等,呢個係「另一個」好有信心嘅答案。問返同一個工具,唔叫查證——只係將個銀仔再擲多次。"},
    ask:{en:"Why can't the AI check itself?", zh:"點解 AI 自己查唔到自己?"},
    next:"b2"},

  bx:{step:"own",
    text:{en:"Everyone's waiting. Your move:", zh:"全班等緊。你點接?"},
    choices:[
      {t:{en:"“But the AI said it! With a source!”", zh:"「但 AI 係咁講㗎!仲有出處!」"}, tone:"risky", axis:"trust", next:"cxa"},
      {t:{en:"“Good catch, Mei. Let me check properly and come back tomorrow.”", zh:"「阿美你提得好。等我查清楚,聽日答返大家。」"}, tone:"wise", fx:{own:1, decide:1}, next:"cxb"}
    ]},
  cxa:{type:"out", tone:"risky", step:"own",
    text:{en:"“…So the AI is giving the presentation?” someone whispers. Ouch. Blaming the tool didn't move the spotlight — you picked the answer, and you carried it in.",
          zh:"有人細細聲:「……即係個報告係 AI 做㗎?」哎。賴個工具,支 spotlight 冇移開過:個答案係你揀、你帶入嚟。"},
    ask:{en:"You didn't write the answer. Did you still choose it?", zh:"個答案唔係你寫。但係咪你揀?"},
    next:"b2"},
  cxb:{type:"out", tone:"wise", step:"own",
    text:{en:"Miss Chan nods. “THAT is what real researchers say.” Somehow “I'll check” sounded stronger than the wrong fact did.",
          zh:"陳老師點頭:「真正嘅研究員就係咁講嘢。」唔知點解,「我查清楚先」聽落,仲似專家過頭先嗰個錯答案。"},
    ask:{en:"Why did admitting it feel strong, not weak?", zh:"點解認返句「未查清楚」,反而顯得強,唔係弱?"},
    next:"b2"},

  b2:{step:"verify",
    text:{en:"That evening: time to find the real answer. Pick your check:", zh:"當晚:係時候搵真答案。揀你嘅查證方法:"},
    choices:{
     pi:[
      {t:{en:"MTR's official info, plus a news article about station depths.", zh:"港鐵官方資料,加一篇講車站深度嘅新聞報道。"}, tone:"wise", fx:{verify:2}, next:"c2a"},
      {t:{en:"A forum comment that agrees with the AI. One's enough!", zh:"討論區有個留言同 AI 講嘅一樣。夠皮啦!"}, tone:"mixed", axis:"trust", next:"c2b"},
      {t:{en:"Ask your uncle — the family's MTR superfan.", zh:"問舅父——成家最痴港鐵嗰個。"}, tone:"wise", fx:{verify:1}, next:"c2c"}
     ],
     ex:[
      {t:{en:"Look at MTR's official information.", zh:"睇港鐵官方資料。"}, tone:"wise", fx:{verify:2}, next:"c2a"},
      {t:{en:"Ask your uncle — he loves the MTR.", zh:"問舅父——佢最熟港鐵。"}, tone:"wise", fx:{verify:1}, next:"c2c"}
     ]}
  },
  c2a:{type:"out", tone:"wise", step:"verify",
    text:{en:"Official info and the news agree: HKU Station, about 70 metres — deep enough to hide a 20-storey building. You fix your project and write down WHERE you checked. Two sources. Locked.",
          zh:"官方資料同新聞講法一致:香港大學站,大約 70 米深——擺得落成幢 20 層高嘅樓。你執返好個專題,仲寫埋你「喺邊度查」。兩個來源。穩。"},
    ask:{en:"Why write down where you checked?", zh:"點解要寫埋「喺邊度查」?"},
    next:{flag:"pasted", then:"end", else:"b3"}},
  c2b:{type:"out", tone:"mixed", step:"verify",
    text:{en:"“Admiralty obviously, my cousin said” — typed by a stranger called “trainboi2012”. One stranger agreeing with the AI isn't a check; it's an echo. Sonar nudges you to the official page… which says HKU, 70 m.",
          zh:"「梗係金鐘啦,我表哥講嘅」——一個叫「trainboi2012」嘅陌生人打嘅。一個陌生人同 AI 講法一樣,唔係查證,係回音。思拿隊長督一督你去官方網頁……上面寫:香港大學站,70 米。"},
    ask:{en:"What's the difference between “someone agrees” and “it's confirmed”?", zh:"「有人同意」同「獲得證實」,差喺邊?"},
    next:{flag:"pasted", then:"end", else:"b3"}},
  c2c:{type:"out", tone:"wise", step:"verify",
    text:{en:"Uncle doesn't even blink: “HKU. Seventy metres. The lifts are FAMOUS.” Then he sends a news clip proving it. People can be sources too — when they can show you receipts.",
          zh:"舅父眼都唔眨:「香港大學站。七十米。啲𨋢出晒名。」跟住仲 send 段新聞片做證。人都可以係來源——只要佢攞得出「單據」。"},
    ask:{en:"What made Uncle a good source — being family, or having receipts?", zh:"舅父點解信得過——因為佢係屋企人,定因為佢攞得出證據?"},
    next:{flag:"pasted", then:"end", else:"b3"}},

  b3:{step:"own",
    text:{en:"Presentation day. Your slide reads: “Deepest: HKU Station (~70 m) — checked: MTR info + news.” Afterwards Mei asks: “How come YOURS was right? Three groups wrote Admiralty.”",
          zh:"報告日。你張 slide 寫住:「最深:香港大學站(約 70 米)——已查證:港鐵資料+新聞」。完咗之後阿美問你:「點解你哋組會啱嘅?有三組都寫咗金鐘。」"},
    choices:[
      {t:{en:"Show her the two-source trick: never trust one voice, however confident.", zh:"教佢「兩個來源」呢招:一把聲幾有信心都好,唔好淨信一把。"}, tone:"wise", fx:{own:1, question:1}, next:"c3a"},
      {t:{en:"Shrug. “I'm just smart like that.” 😏", zh:"耍下膊:「天生醒目,冇辦法。」😏"}, tone:"mixed", next:"c3b"}
    ]},
  c3a:{type:"out", tone:"wise", step:"own",
    text:{en:"Mei's eyes go wide: “The other groups all asked the same AI… that's why they're all wrong the same WAY.” Now two of you check things. It spreads — the good way.",
          zh:"阿美眼都大埋:「嗰三組咪即係問咗同一個 AI……所以先錯得一模一樣!」而家識查證嘅人有兩個。呢樣嘢都會傳染——係好嗰種。"},
    ask:{en:"Three groups, one AI, one identical mistake. What does that tell you?", zh:"三組人、一個 AI、一個一模一樣嘅錯。呢件事話緊你知乜?"},
    next:"end"},
  c3b:{type:"out", tone:"mixed", step:"own",
    text:{en:"She rolls her eyes and walks off. You WERE smart — but the checking method dies with the secret, and next week the one copying answers might be you.",
          zh:"佢反咗個白眼就走。你的確係醒——但個查證方法同個秘密一齊收埋咗;下個星期,抄答案嗰個隨時係你。"},
    ask:{en:"Skills you share come back to you. What happens to skills you hide?", zh:"分享出去嘅技能會回流。收埋嘅技能會點?"},
    next:"end"},

  end:{type:"end",
    text:{en:"Confidence is a sound. What's your move when something SOUNDS sure?", zh:"自信只係一種聲線。下次有嘢「聽落」好肯定,你嘅標準動作係乜?"}}
 }
},

/* ---------- S6 · The AI Best Friend AI 好朋友 ---------- */

/* ---- synthesized SFX (designer kit: assets/sfx.js equivalent, inline) ----
   WebAudio only — no files, no network. Context created lazily on first
   user gesture; every call no-ops when audio is unavailable or muted. */
const TFSFX=(function(){
  let ctx=null;
  function ac(){
    if(!ctx){try{const A=window.AudioContext||window.webkitAudioContext;if(A)ctx=new A();}catch(e){}}
    if(ctx&&ctx.state==="suspended"){try{ctx.resume();}catch(e){}}
    return ctx;
  }
  function tone(f,at,dur,type,vol,slide){
    const c=ac(); if(!c||S.muted)return;
    try{
      const o=c.createOscillator(),g=c.createGain(),t=c.currentTime+(at||0);
      o.type=type||"sine";
      o.frequency.setValueAtTime(f,t);
      if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol||.12,t+.012);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+dur+.02);
    }catch(e){}
  }
  return {
    tap:function(){tone(520,0,.06,"triangle",.07);},
    wise:function(){[523,659,784].forEach(function(f,i){tone(f,i*.07,.18,"triangle",.11);});},
    risky:function(){tone(220,0,.25,"sawtooth",.06,160);},
    mixed:function(){tone(392,0,.12,"triangle",.09);tone(330,.13,.16,"triangle",.09);},
    tick:function(){tone(880,0,.05,"square",.045);},
    sonar:function(){tone(660,0,.09,"sine",.09);tone(660,.12,.12,"sine",.07);},
    correct:function(){tone(659,0,.15,"triangle",.11);tone(880,.08,.15,"triangle",.11);},
    stamp:function(){tone(140,0,.18,"square",.11,90);},
    rewind:function(){tone(300,0,.25,"sine",.09,900);},
    unlock:function(){tone(523,0,.14,"triangle",.09);tone(698,.09,.14,"triangle",.09);},
    fanfare:function(){[523,659,784,1047].forEach(function(f,i){tone(f,i*.12,.3,"triangle",.12);});}
  };
})();
function toggleMute(){S.muted=!S.muted;save();render();if(!S.muted)TFSFX.tap();}

function art(name,cls,w){
  const s=ART[name]; if(!s)return "";
  return '<span class="artw'+(cls?" "+cls:"")+'"'+(w?' style="width:'+w+'px"':"")+' aria-hidden="true">'+s+'</span>';
}
/* per-mission backdrop + cast strip (index-aligned with C.scenarios) */
const SCENE_ART=["s1-homework-night","s2-luna-game-world","s3-group-chat","s4-mtr-underground","s5-art-room","s6-evening-out"];
const CAST=[["smarty","miss-chan","ka-ming"],["luna"],["hayden","mei","miss-chan"],["mei","miss-chan"],["mei"],["wing-yan","kiki"]];
const CHAT_AVATAR={1:"avatar-luna",5:"avatar-kiki"};

function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(raw){return Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),JSON.parse(raw));}
  }catch(e){/* no storage — play in memory */}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
let S=loadState();
let chkWrong=false, chkPicked=-1;

function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){/* in-memory only */}}
function $(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function isLoc(o){return o&&typeof o==="object"&&(o.en!==undefined||o.zh!==undefined);}
function pickTier(v,tier){ if(v&&typeof v==="object"){return v[tier]!==undefined?v[tier]:(v.pi!==undefined?v.pi:v.ex);} return v; }
function ttT(o,tier){ if(o==null)return ""; const v=pickTier(isLoc(o)?o[S.lang]:o,tier); return v==null?"":String(v); }
function tt(o){return ttT(o,S.tier);}
function ui(k){return tt(C.ui[k]);}
function cur(){return C.scenarios[S.si];}
function nodeOf(id){return cur().nodes[id];}
function choicesOf(n,tier){ const c=n.choices; if(Array.isArray(c))return c; const t=tier||S.tier; return c[t]||c.pi||c.ex; }
function resolveNext(nx){
  if(typeof nx==="string")return nx;
  if(nx.flag!==undefined)return S.flags[nx.flag]?nx.then:nx.else;
  return nx[S.tier]!==undefined?nx[S.tier]:(nx.pi!==undefined?nx.pi:nx.ex);
}

/* ---------- shared widgets ---------- */
function owlHTML(pose,cls){return '<span class="owlart '+(cls||"tf-bob")+'" aria-hidden="true">'+(ART[pose]||ART["sonar-neutral"]||"🦉")+'</span>';}
function sonarBubble(text,pose,owlCls){return '<div class="sonar">'+owlHTML(pose,owlCls)+'<div class="bubble"><b class="who">'+esc(ui("sonarName"))+'</b>'+esc(text)+'</div></div>';}
function typingBubble(){
  const av=ART[CHAT_AVATAR[S.si]];
  return '<div class="sonar">'+(av?'<span class="owlart tf-bob" aria-hidden="true">'+av+'</span>':"")+
    '<div class="bubble"><span class="tdots" aria-label="…"><i></i><i></i><i></i></span></div></div>';
}
function loopChips(active){
  let h='<div class="loop" aria-hidden="true">';
  C.stepOrder.forEach(function(k){
    h+='<span class="chip'+(k===active?" on":"")+'" style="--c:'+C.steps[k].color+'">'+esc(tt(C.steps[k].name))+'</span>';
  });
  return h+'</div>';
}
function meterHTML(){
  let segs='',labs='';
  C.stepOrder.forEach(function(k){
    const pct=Math.min(1,(S.skills[k]||0)/C.target)*100;
    segs+='<div class="seg" style="--c:'+C.steps[k].color+'"><i style="width:'+pct+'%"></i></div>';
    labs+='<span>'+esc(tt(C.steps[k].name))+'</span>';
  });
  return '<div class="meter">'+segs+'</div><div class="mlabels">'+labs+'</div>';
}
const TONE_LABEL={wise:"toneWise",risky:"toneRisky",mixed:"toneMixed"};
const TONE_ICON={wise:"🌟",risky:"⚠️",mixed:"🤔"};

/* ---------- render ---------- */
function render(){
  document.documentElement.lang=(S.lang==="zh")?"zh-Hant":"en";
  $("langBtn").textContent=ui("langName");
  const sb=$("sfxBtn");
  if(sb){sb.textContent=S.muted?"🔇":"🔊";if(sb.setAttribute)sb.setAttribute("aria-label",ui("soundLbl"));}
  $("foot").textContent=ui("footer");
  if(S.screen!=="end")profileOpen=false;   /* profile reveal is per-visit */
  ({home:renderHome,hub:renderHub,scene:renderScene,check:renderCheck,end:renderEnd,debrief:renderDebrief}[S.screen]||renderHome)();
  window.scrollTo(0,0);
}

  C.scenarios.forEach(function(scn,i){
    const done=S.done.indexOf(i)>=0, open=i<S.unlocked;
    const icArt=!open?art("icon-lock",null,26):(i===justUnlocked?art("icon-unlock","tf-pop",28):"");
    const inner='<span class="ic">'+(icArt||scn.icon)+'</span><span><span class="tt">'+
      esc(ui("mission"))+' '+(i+1)+' · '+esc(tt(scn.title))+'</span><br><span class="st">'+
      esc(done?ui("replay"):(open?ui("play"):ui("locked")))+'</span></span>';
    h+= open
      ? '<button class="mcard'+(done?" done":"")+(i===justUnlocked?" tf-unlock":"")+'" onclick="startScenario('+i+')">'+inner+'</button>'

    h+='<button class="btn primary" onclick="goEnd()">'+esc(ui("getLicence"))+'</button>';

function startScenario(i){
  if(i>=S.unlocked)return;
  TFSFX.tap();
  Object.keys(typingShown).forEach(function(k){if(k.indexOf(i+":")===0)delete typingShown[k];});
  S.si=i; S.node=C.scenarios[i].start; S.flags={}; S.snaps=[];
  S.log=S.log.filter(function(e){return e.si!==i;});   /* replay replaces old record */
  S.screen="scene"; save(); render();
}

function renderScene(){
  const scn=cur(); const n=nodeOf(S.node);
  if(!n){S.screen="hub";save();render();return;}
  const nodeKey=S.si+":"+S.node;
  const cast=(CAST[S.si]||[]).map(function(nm){return art("avatar-"+nm);}).join("");
  let h='<div class="card tf-enter">'+
    '<div class="shead"><span class="tag">'+esc(ui("mission"))+' '+(S.si+1)+' / '+C.scenarios.length+' · '+scn.icon+' '+esc(tt(scn.title))+'</span>'+
    (cast?'<span class="cast">'+cast+'</span>':"")+'</div>'+
    loopChips(n.step||null);
  if(S.node===scn.start&&ART[SCENE_ART[S.si]]){
    h+='<div class="scenebox tf-enter">'+ART[SCENE_ART[S.si]]+'</div>';
  }
  if(n.type==="end"){
    h+='<div class="center">'+art("stamp-complete","tf-stamp",128)+'</div>'+
       '<h2 class="center">'+esc(ui("missionDone"))+'</h2>'+
       sonarBubble(tt(n.text),"sonar-celebrate")+
       '<p class="center" style="margin-top:10px"><b>'+esc(ui("skillsLit"))+'</b><br>';
    scn.skills.forEach(function(k){
      h+='<span class="skillpill tf-pop" style="--c:'+C.steps[k].color+';margin:3px 2px;display:inline-block">'+esc(tt(C.steps[k].name))+'</span> ';
    });
    h+='</p><button class="btn primary" onclick="finishScenario()">'+esc(ui("continueBtn"))+'</button>';
    if(stampedKey!==nodeKey){stampedKey=nodeKey;TFSFX.stamp();}
  }else if(n.type==="out"){
    const tone=n.tone||"mixed";
    h+='<div class="outcome '+tone+'"><div class="verdict">'+TONE_ICON[tone]+' '+esc(ui(TONE_LABEL[tone]))+
       (tone==="wise"?" "+art("sticker-wise","tf-pop",34):"")+'</div>'+
       '<div class="story">'+esc(tt(n.text))+'</div></div>';
    if(n.ask){
      const pose=tone==="wise"?"sonar-celebrate":tone==="risky"?"sonar-worried":"sonar-thinking";
      h+='<p class="muted" style="margin:8px 0 2px;font-size:.78rem;font-weight:800">'+esc(ui("sonarAsks"))+'</p>'+
         sonarBubble(tt(n.ask),pose,tone==="wise"?"tf-hop":"tf-bob");
    }
    h+='<button class="btn primary" onclick="advance()">'+esc(ui("continueBtn"))+'</button>';
    if(S.snaps.length>0){h+='<button class="btn ghost tf-wiggle" onclick="rewind()">'+art("icon-rewind",null,20)+' '+esc(ui("rewind"))+'</button>';}
  }else if(n.typing&&!typingShown[nodeKey]&&!reducedMotion()){
    /* chatbot beats: show typing dots, then reveal the message */
    h+=typingBubble();
    setTimeout(function(){
      typingShown[nodeKey]=true;
      if(S.screen==="scene"&&S.si+":"+S.node===nodeKey)render();
    },900);
  }else{
    if(n.typing)typingShown[nodeKey]=true;
    if(rewindPraise){
      h+='<div class="tip" style="display:flex;gap:10px;align-items:center">'+art("sticker-rewind-hero",null,46)+'<span>'+esc(ui("rewindPraise"))+'</span></div>';
      rewindPraise=false;
    }
    h+='<div class="story">'+esc(tt(n.text))+'</div>';
    if(n.sonar){h+=sonarBubble(tt(n.sonar),"sonar-thinking");}
    h+='<div style="margin-top:12px">';
    choicesOf(n).forEach(function(ch,i){
      h+='<button class="btn'+(ch.tone==="plain"?" primary":"")+' tf-enter" style="animation-delay:'+(i*70)+'ms" onclick="choose('+i+')">'+esc(tt(ch.t))+'</button>';
    });
    h+='</div>';
  }
  h+='</div>';
  $("app").innerHTML=h;
}

function choose(i){
  const n=nodeOf(S.node); const ch=choicesOf(n)[i];
  if(ch.tone==="plain"){TFSFX.tap();S.node=resolveNext(ch.next);save();render();return;}
  TFSFX[ch.tone==="wise"?"wise":ch.tone==="risky"?"risky":"mixed"]();
  if(ch.fx){setTimeout(function(){TFSFX.tick();},300);}
  S.snaps.push({node:S.node,skills:JSON.parse(JSON.stringify(S.skills)),flags:JSON.parse(JSON.stringify(S.flags)),logLen:S.log.length});
  if(ch.fx){for(const k in ch.fx){S.skills[k]=(S.skills[k]||0)+ch.fx[k];}}
  if(ch.set){for(const k in ch.set){S.flags[k]=ch.set[k];}}
  S.log.push({si:S.si,node:S.node,idx:i,tone:ch.tone,tier:S.tier,axis:ch.axis||null});
  S.node=resolveNext(ch.next);
  save(); render();
}
function advance(){TFSFX.tap();const n=nodeOf(S.node);S.node=resolveNext(n.next);save();render();}
function rewind(){
  const sp=S.snaps.pop(); if(!sp)return;
  TFSFX.rewind();
  S.node=sp.node; S.skills=sp.skills; S.flags=sp.flags; S.log.length=sp.logLen;
  S.rewinds++; rewindPraise=true; save(); render();
}
function finishScenario(){
  if(S.done.indexOf(S.si)<0)S.done.push(S.si);
  const before=S.unlocked;
  S.unlocked=Math.max(S.unlocked,Math.min(C.scenarios.length,S.si+2));
  if(S.unlocked>before){justUnlocked=S.unlocked-1;TFSFX.unlock();}
  S.node=null; S.snaps=[];
  if(C.checks[S.si]&&S.checksDone.indexOf(S.si)<0){S.screen="check";chkWrong=false;chkPicked=-1;}
  else{S.screen="hub";}
  save(); render();
}

  const ck=C.checks[S.si];
  if(!ck){S.screen="hub";save();render();return;}
  let h='<div class="card tf-enter">'+

    sonarBubble(ui("checkIntro"),"sonar-point")+

  ck.opts.forEach(function(o,i){

function pickCheck(i){
  const ck=C.checks[S.si];

  else{TFSFX.correct();}

function checkDone(){
  const ck=C.checks[S.si];
  if(S.checksDone.indexOf(S.si)<0){
    S.checksDone.push(S.si);
    if(!chkWrong){S.skills[ck.step]=(S.skills[ck.step]||0)+1;}
  }
  chkPicked=-1; chkWrong=false; S.screen="hub"; save(); render();
}

/* ---------- pilot profile (v1.1) ----------
   Deterministic classification from the SAME data the meter and debrief
   already use: skill totals (fx) + the choice log (tones and axis tags).
     axis:"trust" = leaned into AI/content without checking
     axis:"guard" = pushed AI away even where it would help
     human        = wise choices in missions 5–6 (people & honesty stories)
   "Slow to decide" is interpreted as DECIDE/OWN trailing QUESTION/VERIFY
   (the game deliberately has no time pressure). Recomputed fresh on every
   render, so rewinds/replays always give the current, correct profile.
   Order matters — first match wins. Captain must be EARNED; on ambiguous
   data we prefer Test Pilot / Wingmate over Captain:
     1 Captain     min(all 5 skills) >= 3  AND risky<=2 AND trust<=2 AND guard<=2
     2 Autopilot   trust >= 4  OR  (verify <= 2 AND risky >= 4)
     3 Ground Crew guard >= G AND guard > trust     (G = 3 Pilot tier, 2 Explorer:
                                                     Explorer sees fewer guard options)
     4 Wingmate    human >= 3 AND verify <= 3
     5 Test Pilot  verify + question >= 4
     6 fallback    verify+question >= decide+own ? Test Pilot : Wingmate          */
function computeProfile(){
  const sk=S.skills;
  let trust=0,guard=0,risky=0,human=0;
  const sis={trust:[],guard:[],risky:[],human:[]};
  function mark(arr,si){ if(arr.indexOf(si+1)<0)arr.push(si+1); }
  S.log.forEach(function(e){
    if(e.axis==="trust"){trust++;mark(sis.trust,e.si);}
    if(e.axis==="guard"){guard++;mark(sis.guard,e.si);}
    if(e.tone==="risky"){risky++;mark(sis.risky,e.si);}
    if(e.tone==="wise"&&(e.si===4||e.si===5)){human++;mark(sis.human,e.si);}
  });
  const p=sk.pause||0,q=sk.question||0,v=sk.verify||0,d=sk.decide||0,o=sk.own||0;
  const G=(S.tier==="ex")?2:3;
  let key;
  if(Math.min(p,q,v,d,o)>=3&&risky<=2&&trust<=2&&guard<=2)key="captain";
  else if(trust>=4||(v<=2&&risky>=4))key="autopilot";
  else if(guard>=G&&guard>trust)key="ground";
  else if(human>=3&&v<=3)key="wingmate";
  else if(v+q>=4)key="test";
  else key=(v+q>=d+o)?"test":"wingmate";
  return {key:key,trust:trust,guard:guard,risky:risky,human:human,sis:sis};
}

    '<span class="tag">🪪 '+esc(ui("profileTitle"))+'</span>'+

    '<div class="snapshot">'+esc(ui("snapshot"))+'</div>'+
  '</div>'+
  '<button class="btn primary" onclick="resetAll()">'+esc(ui("flyAgain"))+'</button>';
}

/* ---------- licence & debrief ---------- */
function rankedSkills(){
  return C.stepOrder.slice().sort(function(a,b){return (S.skills[b]||0)-(S.skills[a]||0);});
}
function fmtDate(){return new Date().toLocaleDateString(S.lang==="zh"?"zh-HK":"en-GB");}
function tierName(){return S.tier==="ex"?ui("tierEx"):ui("tierPi");}

function renderEnd(){
  if(!S.licNo){S.licNo="TF-"+String(Math.floor(1000+Math.random()*9000));save();}
  if(!endCelebrated){endCelebrated=true;TFSFX.fanfare();setTimeout(confettiBurst,200);}
  const r=rankedSkills(), strong=r[0], focus=r[r.length-1];
  const nm=(S.name||"").trim()||ui("defaultPilot");
  let h='<div class="card center"><div class="big">🎓</div><h1>'+esc(ui("endTitle"))+'</h1>'+
        '<p class="muted">'+esc(ui("allDone"))+'</p></div>';
  h+='<div class="lic"><div class="inner">'+
    '<div class="center">'+art("seal-licence","tf-pop",150)+'</div>'+
    '<p class="muted" style="margin:0;font-size:.8rem">'+esc(ui("licensedTo"))+'</p>'+
    '<div class="nm">'+esc(nm)+'</div>'+
    '<p style="font-weight:700;font-size:.88rem">'+esc(ui("licLine"))+'</p>'+
    meterHTML()+
    '<div class="row"><span>'+esc(ui("licNo"))+': '+esc(S.licNo)+'</span><span>'+esc(ui("dateLbl"))+': '+esc(fmtDate())+'</span><span>'+esc(ui("tierLbl"))+': '+esc(tierName())+'</span></div>'+
    '<div class="row"><span>'+esc(ui("strongest"))+':<br><span class="skillpill" style="--c:'+C.steps[strong].color+'">'+esc(tt(C.steps[strong].name))+'</span></span>'+
    '<span>'+esc(ui("focus"))+':<br><span class="skillpill" style="--c:'+C.steps[focus].color+'">'+esc(tt(C.steps[focus].name))+'</span></span></div>'+
    '<p class="muted" style="font-size:.75rem;margin:6px 0 0">'+esc(ui("focusNote"))+'</p>'+
    '<span class="stamp">🦉 '+esc(ui("sonarName"))+' ✓</span>'+
  '</div></div>';
  h+=sonarBubble(ui("profileAsk"),"sonar-wink");
  h+= profileOpen ? profileCardHTML()
                  : '<button class="btn primary" onclick="openProfile()">'+esc(ui("showProfile"))+'</button>';
  h+='<div class="card"><h2>🚀 '+esc(ui("missionsTitle"))+'</h2>';
  C.missions.forEach(function(m){
    h+='<div class="mission"><span class="dot" style="--c:'+C.steps[m.step].color+'"></span><span>'+esc(tt(m.t))+'</span></div>';
  });

     '<button class="btn ghost" onclick="goHub()">'+esc(ui("toHub"))+'</button>'+

  $("app").innerHTML=h;
}

function renderDebrief(){
  const nm=(S.name||"").trim()||ui("defaultPilot");
  const weakFirst=C.stepOrder.slice().sort(function(a,b){return (S.skills[a]||0)-(S.skills[b]||0);});
  const qs=[C.debriefQs[weakFirst[0]],C.debriefQs[weakFirst[1]],C.debriefQs.general];

    '<h2>'+art("icon-loop-ring",null,38)+' '+esc(ui("appName"))+' — '+esc(ui("debriefTitle"))+'</h2>'+
    '<p class="muted">'+esc(ui("debriefIntro"))+'</p>'+
    '<p><b>'+esc(nm)+'</b> · '+esc(fmtDate())+' · '+esc(tierName())+'</p>'+
    '<h3 style="margin-top:10px">'+esc(ui("meterSnap"))+'</h3>'+meterHTML()+
    '<p class="muted" style="font-size:.8rem">'+
      C.stepOrder.map(function(k){return esc(tt(C.steps[k].name))+" "+Math.min(S.skills[k]||0,C.target)+"/"+C.target;}).join(" · ")+
    '</p>'+
    profileDebriefHTML()+
    '<div class="tones">'+esc(ui("toneWise"))+' · '+esc(ui("toneMixed"))+' · '+esc(ui("toneRisky"))+'</div>'+
    '<h3>'+esc(ui("choicesMade"))+'</h3>';
  C.scenarios.forEach(function(scn,i){
    h+='<div class="sc"><h3>'+scn.icon+' '+esc(ui("mission"))+' '+(i+1)+' · '+esc(tt(scn.title))+'</h3>';
    const entries=S.log.filter(function(e){return e.si===i;});
    if(entries.length===0){h+='<p class="muted">'+esc(ui("notPlayed"))+'</p>';}
    else{
      h+='<ul>';
      entries.forEach(function(e){
        const n=scn.nodes[e.node]; let label="";

        h+='<li>'+(TONE_ICON[e.tone]||"·")+' '+esc(label)+'</li>';
      });
      h+='</ul>';
    }
    h+='</div>';
  });

  h+='<h3>'+esc(ui("discussion"))+'</h3><ol class="qs">';
  qs.forEach(function(q){h+='<li>'+esc(tt(q))+'</li>';});
  h+='</ol><p class="muted" style="font-size:.75rem">'+esc(ui("footer"))+'</p></div>';
  h+='<div class="no-print">'+
    '<button class="btn primary" onclick="window.print()">'+esc(ui("print"))+'</button>'+
    '<button class="btn ghost" onclick="debriefBack()">'+esc(ui("back"))+'</button></div>';
  $("app").innerHTML=h;
}
function debriefBack(){S.screen=(S.debriefFrom==="end")?"end":"hub";save();render();}

/* adult-facing profile diagnostic — Debrief Sheet only */
function profileDebriefHTML(){
  if(S.log.length===0)return "";
  const pr=computeProfile(), P=C.profiles[pr.key];
  const under=C.stepOrder.filter(function(k){return (S.skills[k]||0)<C.target;})
    .map(function(k){return tt(C.steps[k].name);}).join(", ");
  function sig(label,n,sis){
    return esc(ui(label))+" ×"+n+(sis.length?" (M"+sis.join(", M")+")":"");
  }
  let h='<h3>🪪 '+esc(ui("debriefProfile"))+'</h3>'+
    '<p><b>'+P.icon+' '+esc(tt(P.name))+'</b> — <span class="profdiag">'+esc(tt(P.diag))+'</span></p>'+
    '<p class="muted" style="font-size:.85rem"><b>'+esc(ui("underused"))+':</b> '+esc(under||ui("noneLbl"))+'</p>'+
    '<p class="muted" style="font-size:.85rem"><b>'+esc(ui("signals"))+':</b> ⚠️ '+
      sig("sigRisky",pr.risky,pr.sis.risky)+' · 🤖 '+
      sig("sigTrust",pr.trust,pr.sis.trust)+' · 🛑 '+
      sig("sigGuard",pr.guard,pr.sis.guard)+' · 🤝 '+
      sig("sigHuman",pr.human,pr.sis.human)+'</p>'+
    '<p style="margin:6px 0 2px"><b>'+esc(ui("profQs"))+':</b></p><ol class="qs">';
  P.qs.forEach(function(q){h+='<li>'+esc(tt(q))+'</li>';});
  return h+'</ol>';
}

function resetProgress(){
  const keep={lang:S.lang,tier:S.tier,name:S.name,muted:S.muted};
  S=JSON.parse(JSON.stringify(DEFAULTS));
  Object.assign(S,keep);
  typingShown={}; stampedKey=null; justUnlocked=-1; endCelebrated=false; rewindPraise=false;
  save();
}
function resetAll(){
  if(confirm(ui("confirmReset"))){resetProgress();S.screen="home";save();render();}
}

render();
